apiVersion: apps/v1
kind: Deployment
metadata:
  name: ensa-investor-api
  namespace: ensa-investor-prod
  labels:
    app: ensa-investor-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ensa-investor-api
  template:
    metadata:
      labels:
        app: ensa-investor-api
    spec:
      containers:
        - name: ensa-investor-api
          image: gcr.io/ensa-project/ensa-investor-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ensa-api-config
            - secretRef:
                name: ensa-api-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1024Mi"
              cpu: "1000m"
