# ============================================================
# DEV Profile — Local Development with Docker Compose
# ============================================================
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:${MYSQLHOST:localhost}}:${MYSQL_PORT:${MYSQLPORT:3306}}/${MYSQL_DATABASE:${MYSQLDATABASE:ensa_investor}}?useSSL=${MYSQL_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=Africa/Luanda&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:${MYSQLUSER:root}}
    password: ${MYSQL_PASSWORD:${MYSQL_ROOT_PASSWORD:${MYSQLPASSWORD:}}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    clean-on-validation-error: false

  # ---- Email: Mailhog for local dev (view emails at http://localhost:8025) ----
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}

logging:
  level:
    ao.co.ensa.investor: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
