# ============================================================
# DEV Profile — Local Development with Docker Compose
# ============================================================
spring:
  datasource:
    # Use service name format for PDB (XEPDB1): @//host:port/service_name
    url: jdbc:oracle:thin:@//${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}/${ORACLE_SID:XEPDB1}
    username: ${ORACLE_USERNAME:SYSTEM}
    password: ${ORACLE_PASSWORD:ensa_dev_password}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    clean-on-validation-error: false   # Never clean (Oracle SYSTEM schema cannot be cleaned; use dedicated user)

  # ---- Email: Mailhog for local dev (view emails at http://localhost:8025) ----
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}

logging:
  level:
    ao.co.ensa.investor: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
