# ============================================================
# ORACLE Profile — Production Oracle DB (requires VPN to 10.1.x.x)
# ============================================================
spring:
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_HOST:10.1.0.66}:${ORACLE_PORT:1521}/${ORACLE_SERVICE:PIEPRD}
    username: ${ORACLE_USER:pdbadmin}
    password: ${ORACLE_PASSWORD:dbaadm1n}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      initialization-fail-timeout: -1

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        boot:
          allow_jdbc_metadata_access: false

  flyway:
    enabled: true
    locations: classpath:db/migration/oracle
    baseline-on-migrate: false
    repair-on-migrate: true

logging:
  level:
    root: WARN
    ao.co.ensa.investor: INFO
    com.zaxxer.hikari: WARN
    oracle.jdbc: WARN
