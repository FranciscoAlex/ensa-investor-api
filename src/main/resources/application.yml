# ============================================================
# ENSA Investor API — Application Configuration
# ============================================================
spring:
  application:
    name: ensa-investor-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # ---- Flyway Migration ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:${REDISHOST:localhost}}
      port: ${REDIS_PORT:${REDISPORT:6379}}
      username: ${REDIS_USERNAME:${REDISUSER:}}
      password: ${REDIS_PASSWORD:${REDISPASSWORD:}}
      url: ${REDIS_URL:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ---- Session (Redis-backed) ----
  session:
    store-type: redis
    timeout: 3600s
    redis:
      namespace: ensa:session

  # ---- Email / SMTP ----
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ---- Multipart (file upload) ----
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: Africa/Luanda

# ============================================================
# JWT Configuration
# ============================================================
app:
  jwt:
    secret: ${JWT_SECRET:ensa-investor-super-secret-key-change-in-production-min-256-bits-required}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
    issuer: ensa-investor-api

  # Upload storage
  upload:
    dir: ${UPLOAD_DIR:./uploads}

  # AES Encryption
  encryption:
    algorithm: AES/GCM/NoPadding
    key: ${AES_SECRET_KEY:0123456789abcdef0123456789abcdef}
    key-size: 256

  # Base URL for activation and password-reset links (frontend or API base)
  base-url: ${APP_BASE_URL:http://localhost:8080}

  # Frontend URL for post-activation redirects and email links
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}

  # CORS
  cors:
    allowed-origins: ${CORS_ORIGINS:https://investorensa.up.railway.app,https://investidor.ensa.co.ao,https://www.ensa.co.ao,https://*.railway.app,http://localhost:3000,http://localhost:4173,http://localhost:4200}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600

# ============================================================
# Server Configuration
# ============================================================
server:
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    include-message: always
    include-binding-errors: always

# ============================================================
# Actuator (Health / Metrics)
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ============================================================
# Logging
# ============================================================
logging:
  level:
    root: INFO
    ao.co.ensa.investor: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ensa-investor-api.log

# ============================================================
# OpenAPI / Swagger
# ============================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
