# ============================================================
# PROD Profile — Production / Kubernetes
# ============================================================
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:${MYSQLHOST}}:${MYSQL_PORT:${MYSQLPORT:3306}}/${MYSQL_DATABASE:${MYSQLDATABASE:railway}}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=Africa/Luanda
    username: ${MYSQL_USER:${MYSQLUSER:root}}
    password: ${MYSQL_PASSWORD:${MYSQL_ROOT_PASSWORD:${MYSQLPASSWORD:}}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    clean-on-validation-error: false

logging:
  level:
    root: WARN
    ao.co.ensa.investor: INFO
    org.springframework.security: WARN
