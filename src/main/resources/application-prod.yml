# ============================================================
# PROD Profile — Production / Kubernetes
# ============================================================
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${MYSQL_JDBC_URL:jdbc:mysql://${MYSQL_HOST:${MYSQLHOST:${RAILWAY_PRIVATE_DOMAIN:${RAILWAY_TCP_PROXY_DOMAIN:localhost}}}}:${MYSQL_PORT:${MYSQLPORT:${RAILWAY_TCP_PROXY_PORT:3306}}}/${MYSQL_DATABASE:${MYSQLDATABASE:railway}}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=Africa/Luanda}}
    username: ${MYSQL_USER:${MYSQLUSER:root}}
    password: ${MYSQL_PASSWORD:${MYSQL_ROOT_PASSWORD:${MYSQLPASSWORD:}}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        boot:
          allow_jdbc_metadata_access: false

  flyway:
    enabled: false

logging:
  level:
    root: WARN
    ao.co.ensa.investor: INFO
    org.springframework.security: WARN

app:
  # Prevent generated links from leaking the internal container port (:8080)
  base-url: ${APP_BASE_URL:https://${RAILWAY_PUBLIC_DOMAIN:investorensa.up.railway.app}}

server:
  # Trust X-Forwarded-* headers from Railway proxy for correct public URL generation
  forward-headers-strategy: framework
