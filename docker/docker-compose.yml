services:
  ensa-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ensa-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - ORACLE_HOST=oracle-xe
      - ORACLE_PORT=1521
      - ORACLE_SID=XEPDB1
      - ORACLE_USERNAME=ensa_dev
      - ORACLE_PASSWORD=ensa_dev_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=ensa-investor-super-secret-key-change-in-production-min-256-bits-required
      - AES_SECRET_KEY=0123456789abcdef0123456789abcdef
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - APP_FRONTEND_URL=http://localhost:3000
    depends_on:
      oracle-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - ensa-network

  oracle-init:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-init
    volumes:
      - ./init-oracle:/init
    entrypoint: ["/bin/sh", "/init/run.sh"]
    depends_on:
      oracle-xe:
        condition: service_healthy
    networks:
      - ensa-network
    restart: "no"

  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=ensa_dev_password
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - ensa-network
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 120s

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ensa-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — view emails at http://localhost:8025
    networks:
      - ensa-network

networks:
  ensa-network:
    driver: bridge

volumes:
  oracle-data:
  redis-data:
