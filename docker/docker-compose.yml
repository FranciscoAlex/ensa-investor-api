services:
  ensa-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ensa-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=ensa_investor
      - MYSQL_USER=ensa_dev
      - MYSQL_PASSWORD=ensa_dev_password
      - MYSQL_USE_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FLYWAY_ENABLED=true
      - JWT_SECRET=ensa-investor-super-secret-key-change-in-production-min-256-bits-required
      - AES_SECRET_KEY=0123456789abcdef0123456789abcdef
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - APP_FRONTEND_URL=http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - ensa-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=ensa_dev_password
      - MYSQL_DATABASE=ensa_investor
      - MYSQL_USER=ensa_dev
      - MYSQL_PASSWORD=ensa_dev_password
      - TZ=Africa/Luanda
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ensa-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pensa_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ensa-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — view emails at http://localhost:8025
    networks:
      - ensa-network

networks:
  ensa-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
